<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор зарплаты — административный персонал</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --border: #e8e5de;
    --text: #1a1917;
    --muted: #6b6860;
    --accent: #e6b85c;
    --accent-dark: #b8892a;
    --green: #2d7a4f;
    --green-bg: #eaf5ef;
    --red: #c0392b;
    --red-bg: #fdecea;
    --warn: #b8892a;
    --warn-bg: #fef9ee;
    --blue-bg: #eef4fb;
    --blue: #2563a8;
    --radius: 12px;
    --radius-sm: 7px;
    font-family: 'Manrope', sans-serif;
  }
  body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1.5rem 4rem; }
  .page { max-width: 900px; margin: 0 auto; }

  .header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--muted); }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px; background: var(--accent); color: #fff; margin-left: 8px; vertical-align: middle; letter-spacing: .03em; }

  .section { margin-bottom: 1.75rem; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }
  input[type=number], select {
    width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  input[type=number]:focus, select:focus { border-color: var(--accent); }

  .emp-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .emp-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px;
  }
  .emp-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .emp-info { flex: 1; }
  .emp-info .ename { font-size: 14px; font-weight: 600; }
  .emp-info .epos { font-size: 12px; color: var(--muted); }
  .del-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .del-btn:hover { color: var(--red); background: var(--red-bg); }
  .emp-fields { display: grid; grid-template-columns: 2fr 2fr 1fr 1.2fr; gap: 10px; align-items: end; }
  .kpi-tag { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; display: inline-block; }
  .kpi-tag.green { background: var(--green-bg); color: var(--green); }
  .kpi-tag.warn  { background: var(--warn-bg);  color: var(--warn); }
  .kpi-tag.red   { background: var(--red-bg);   color: var(--red); }
  .kpi-tag.blue  { background: var(--blue-bg);  color: var(--blue); }

  .add-btn {
    width: 100%; padding: 10px; border: 1px dashed var(--border); border-radius: var(--radius);
    background: transparent; color: var(--muted); font-size: 13px; font-family: inherit;
    cursor: pointer; transition: all .15s;
  }
  .add-btn:hover { background: var(--card); color: var(--text); border-color: var(--accent); }

  .results-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
  .metric { padding: 16px 18px; border-right: 1px solid var(--border); }
  .metric:last-child { border-right: none; }
  .metric .m-val { font-size: 22px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
  .metric .m-lbl { font-size: 11px; color: var(--muted); font-weight: 500; }
  .metric.ok .m-val { color: var(--green); }
  .metric.warn-m .m-val { color: var(--warn); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); background: var(--bg); }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:last-child td { border-bottom: none; background: var(--bg); font-weight: 600; }
  .salary-cell { color: var(--green); font-weight: 700; }

  .formula { padding: 14px 18px; border-top: 1px solid var(--border); background: var(--blue-bg); font-size: 13px; color: var(--blue); line-height: 1.6; }
  .formula strong { font-weight: 700; }

  @media(max-width: 640px) {
    .grid2 { grid-template-columns: 1fr; }
    .grid4 { grid-template-columns: 1fr 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .emp-fields { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>Зарплата административного персонала <span class="badge">Business Booster</span></h1>
    <p>Балльная система с коррекцией по коэффициенту выполнения личного плана</p>
  </div>

  <div class="section">
    <div class="section-label">Фонд оплаты труда</div>
    <div class="card grid2">
      <div>
        <label>Маржа за период ($)</label>
        <input type="number" id="margin" value="45000" oninput="calc()">
      </div>
      <div>
        <label>% от маржи на ФОТ административного персонала</label>
        <input type="number" id="fotPct" value="15" min="1" max="50" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Сотрудники</div>
    <div class="emp-list" id="emp-list"></div>
    <button class="add-btn" onclick="addEmp()">+ добавить сотрудника</button>
  </div>

  <div class="section">
    <div class="section-label">Результат расчёта</div>
    <div class="results-card">
      <div class="metrics">
        <div class="metric"><div class="m-val" id="r-fot">$0</div><div class="m-lbl">Фонд ФОТ</div></div>
        <div class="metric"><div class="m-val" id="r-price">$0.00</div><div class="m-lbl">Цена 1 балла</div></div>
        <div class="metric"><div class="m-val" id="r-pts">0</div><div class="m-lbl">Баллов итого (скор.)</div></div>
        <div class="metric ok" id="m-paid"><div class="m-val" id="r-paid">$0</div><div class="m-lbl">Выплачено</div></div>
      </div>
      <table>
        <thead><tr><th>Сотрудник</th><th>Должность</th><th>Баллы</th><th>Коэф.</th><th>Скор. баллы</th><th>Зарплата</th><th>% от ФОТ</th></tr></thead>
        <tbody id="result-body"></tbody>
      </table>
      <div class="formula" id="formula"></div>
    </div>
  </div>

</div>
<script>
const POSITIONS = [
  {name:"Генеральный директор",pts:900,dept:"Управляющий"},
  {name:"Зам. по адм. вопросам",pts:700,dept:"Управляющий"},
  {name:"Зам. по тех. вопросам",pts:700,dept:"Управляющий"},
  {name:"Рук. службы безопасности",pts:600,dept:"Управляющий"},
  {name:"Руководитель отдела",pts:500,dept:"Персонала"},
  {name:"Начальник отдела найма",pts:300,dept:"Персонала"},
  {name:"Начальник отдела обеспечения",pts:300,dept:"Персонала"},
  {name:"Секретарь приемной",pts:200,dept:"Персонала"},
  {name:"Рядовой сотрудник",pts:200,dept:""},
];
let employees = [
  {id:1,name:"Иванов И.",posIdx:3,kpi:1.2},
  {id:2,name:"Петров П.",posIdx:0,kpi:0.8},
  {id:3,name:"Бондаренко С.",posIdx:1,kpi:1.2},
  {id:4,name:"Сидоров Н.",posIdx:2,kpi:0.8},
  {id:5,name:"Гнатенко И.",posIdx:4,kpi:1.2},
  {id:6,name:"Севастьянов Н.",posIdx:5,kpi:1.5},
  {id:7,name:"Афанасьев С.",posIdx:6,kpi:0.8},
  {id:8,name:"Белкина Е.",posIdx:7,kpi:1.2},
];
let nextId = 9;

function initials(n){return n.trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'??';}
function kpiTag(v){
  if(v>=1.3) return `<span class="kpi-tag green">перевыполнил</span>`;
  if(v>=1.0) return `<span class="kpi-tag blue">план</span>`;
  if(v>=0.8) return `<span class="kpi-tag warn">ниже плана</span>`;
  return `<span class="kpi-tag red">критично</span>`;
}
function fmt(n){return '$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function render(){
  document.getElementById('emp-list').innerHTML = employees.map(e=>{
    const pos = POSITIONS[e.posIdx];
    const opts = POSITIONS.map((p,i)=>`<option value="${i}"${i===e.posIdx?' selected':''}>${p.name} (${p.pts} б.)</option>`).join('');
    return `<div class="emp-card">
      <div class="emp-top">
        <div class="avatar">${initials(e.name)}</div>
        <div class="emp-info">
          <div class="ename">${e.name}</div>
          <div class="epos">${pos.dept ? pos.dept+' · ' : ''}${pos.pts} баллов базово</div>
        </div>
        <button class="del-btn" onclick="del(${e.id})" title="Удалить">×</button>
      </div>
      <div class="emp-fields">
        <div><label>ФИО</label><input value="${e.name}" oninput="upd(${e.id},'name',this.value)"></div>
        <div><label>Должность</label><select onchange="upd(${e.id},'posIdx',+this.value)">${opts}</select></div>
        <div><label>Коэф. плана</label><input type="number" min="0.5" max="2" step="0.1" value="${e.kpi}" oninput="upd(${e.id},'kpi',+this.value)"></div>
        <div><label>Статус</label><div style="padding-top:5px">${kpiTag(e.kpi)}</div></div>
      </div>
    </div>`;
  }).join('');
  calc();
}

function addEmp(){employees.push({id:nextId++,name:"Новый сотрудник",posIdx:8,kpi:1.0});render();}
function del(id){employees=employees.filter(e=>e.id!==id);render();}
function upd(id,f,v){const e=employees.find(e=>e.id===id);if(e){e[f]=v;}if(f==='posIdx'||f==='kpi')render();else calc();}

function calc(){
  const margin=+document.getElementById('margin').value||0;
  const pct=+document.getElementById('fotPct').value||15;
  const fot=margin*pct/100;
  const rows=employees.map(e=>{const p=POSITIONS[e.posIdx];return{...e,pts:p.pts,posName:p.name,scored:Math.round(p.pts*e.kpi*100)/100};});
  const totalScored=rows.reduce((s,r)=>s+r.scored,0);
  const price=totalScored>0?fot/totalScored:0;
  const salaries=rows.map(r=>({...r,salary:r.scored*price}));
  const totalPaid=salaries.reduce((s,r)=>s+r.salary,0);

  document.getElementById('r-fot').textContent=fmt(fot);
  document.getElementById('r-price').textContent='$'+price.toFixed(2);
  document.getElementById('r-pts').textContent=Math.round(totalScored);
  document.getElementById('r-paid').textContent=fmt(totalPaid);
  const diff=Math.abs(totalPaid-fot);
  document.getElementById('m-paid').className='metric '+(diff<1?'ok':'warn-m');

  document.getElementById('result-body').innerHTML=salaries.map(r=>{
    const p=fot>0?(r.salary/fot*100).toFixed(1):'0.0';
    return `<tr><td>${r.name}</td><td>${r.posName}</td><td>${r.pts}</td><td>${r.kpi}</td><td><strong>${r.scored.toFixed(1)}</strong></td><td class="salary-cell">${fmt(r.salary)}</td><td style="color:var(--muted)">${p}%</td></tr>`;
  }).join('')+`<tr><td colspan="4">Итого</td><td>${Math.round(totalScored)}</td><td class="salary-cell">${fmt(totalPaid)}</td><td></td></tr>`;

  const ex=salaries[0];
  if(ex){
    document.getElementById('formula').innerHTML=
      `<strong>Пример (${ex.name}):</strong> ${ex.pts} баллов × ${ex.kpi} (коэф.) = <strong>${ex.scored.toFixed(1)} скор. баллов</strong> &nbsp;×&nbsp; $${price.toFixed(2)} (цена балла) = <strong>${fmt(ex.salary)}</strong>&emsp;|&emsp;Цена балла = ${fmt(fot)} ÷ ${Math.round(totalScored)} = <strong>$${price.toFixed(2)}</strong>`;
  }
}
render();
</script>
</body>
</html>
